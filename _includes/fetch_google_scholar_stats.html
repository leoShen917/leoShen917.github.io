<script>
  document.addEventListener("DOMContentLoaded", function () {
    const citationElements = document.querySelectorAll(".show_paper_citations");
    if (citationElements.length === 0) return;

    {% if site.google_scholar_stats_use_cdn %}
    const baseUrl = "https://cdn.jsdelivr.net/gh/{{ site.repository }}@";
    {% else %}
    const baseUrl = "https://raw.githubusercontent.com/{{ site.repository }}/";
    {% endif %}

    fetch(baseUrl + "google-scholar-stats/gs_data.json")
      .then(function (response) {
        if (!response.ok) throw new Error("Citation data request failed");
        return response.json();
      })
      .then(function (data) {
        citationElements.forEach(function (element) {
          const paperId = element.dataset.paperId || element.getAttribute("data");
          const publication = data.publications && data.publications[paperId];
          if (publication) {
            element.textContent = " | Citations: " + publication.num_citations;
          }
        });
      })
      .catch(function () {
        // Citation counts are optional; keep the publication list usable offline.
      });
  });
</script>
