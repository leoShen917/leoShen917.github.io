name: Update Google Scholar citations

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: google-scholar-citations
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
          cache-dependency-path: google_scholar_crawler/requirements.txt

      - name: Install dependencies
        run: python -m pip install -r google_scholar_crawler/requirements.txt

      - name: Fetch citation data
        working-directory: google_scholar_crawler
        env:
          GOOGLE_SCHOLAR_ID: ${{ secrets.GOOGLE_SCHOLAR_ID }}
        run: python main.py

      - name: Publish generated JSON
        run: |
          mkdir -p /tmp/google-scholar-stats
          cp google_scholar_crawler/results/*.json /tmp/google-scholar-stats/
          git checkout --orphan google-scholar-stats
          git rm -rf .
          cp /tmp/google-scholar-stats/*.json .
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add *.json
          git commit -m "Update citation data"
          git push --force origin google-scholar-stats
