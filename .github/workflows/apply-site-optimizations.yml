name: Apply validated site optimizations

on:
  push:
    branches:
      - leoShen917-patch-1
    paths:
      - .github/workflows/apply-site-optimizations.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor == github.repository_owner
    runs-on: ubuntu-latest
    steps:
      - name: Check out temporary branch
        uses: actions/checkout@v4
        with:
          ref: leoShen917-patch-1

      - name: Apply verified patch
        run: |
          echo "07cb22fa30af1853f15743cd8c539ccf089db4376d6360f4071dbf54a621ed24  leo-site.patch" | sha256sum --check
          git apply --index leo-site.patch
          git rm leo-site.patch
          git rm .github/workflows/update_github_myprofile.yaml
          git rm .github/workflows/apply-site-optimizations.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Apply validated site optimizations"
          git push origin HEAD:leoShen917-patch-1
